<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canzoniere</title>
  <script src="chordsheetbundle.js"></script>
  <!-- script src="https://unpkg.com/chordsheetjs@latest/dist/chordsheetjs.min.js"></script -->
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      padding: 20px;
      line-height: 1.2;
    }
    #song {
      line-height: 1.6;
      margin-top: 1rem;
    }
    .paragraph {
      margin-bottom: 1.2rem;
    }
    .row {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-end;
      gap: 0.2rem;
    }
    .column {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      white-space: preserve nowrap;
    }
  </style>
</head>
<body>
  <h1 id="title">Caricamento...</h1>
  <div id="song"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    // expected: ?path=wonderwall.txt
    let myPath = params.get("path");
    async function loadSong() {
      if (!myPath) {
        document.getElementById("title").textContent = "Brisa";
        document.getElementById("song").textContent = "Canzone non trovata, usa ?path=filename.txt";
        return;
      }
      
      const fileName = myPath.replace(/\.txt$/, "");
      document.getElementById("title").textContent = fileName.replace(/-/g, " ");
      
      // assume all songs are inside canzoni/ folder
      const filePath = "canzoni/" + myPath;
      try {
        const response = await fetch(filePath);
        if (!response.ok) {
          throw new Error("File non trovato: " + filePath + "\n" + text);
        }
        const text = await response.text();

        // accordi
        const parser = new ChordSheetJS.ChordProParser();
        const song = parser.parse(text);
        const formatter = new ChordSheetJS.HtmlDivFormatter();
        document.getElementById("song").innerHTML = formatter.format(song);
      } catch (e) {
        document.getElementById("song").textContent = e.message;
      }
    }
    loadSong();
  </script>
</body>
</html>
