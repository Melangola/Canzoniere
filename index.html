<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canzoniere</title>
  <script src="https://unpkg.com/chordsheetjs@latest/dist/chordsheetjs.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    #song {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1 id="title">Caricamento...</h1>
  <div id="song"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    // expected: ?path=/wonderwall.txt
    let myPath = params.get("path");
    async function loadSong() {
      if (!myPath) {
        document.getElementById("title").textContent = "Brisa";
        document.getElementById("song").textContent = "Canzone non trovata, usa ?path=/filename.txt";
        return;
      }
      // normalize path
      if (myPath.startsWith("/")) myPath = myPath.slice(1);
      // assume all songs are inside canzoni/ folder
      const filePath = "canzoni/" + myPath;
      try {
        const response = await fetch(filePath);
        const text = await response.text();
        const fileName = myPath.split("/").pop().replace(/\.txt$/, "");
        document.getElementById("title").textContent = fileName.replace(/-/g, " ");
        const parser = new ChordSheetJS.ChordProParser();
        const song = parser.parse(text);
        const formatter = new ChordSheetJS.HtmlTableFormatter();
        document.getElementById("song").innerHTML = formatter.format(song);
      } catch (e) {
        document.getElementById("title").textContent = "Errore nel caricamento";
        document.getElementById("song").textContent = filePath;
      }
    }
    loadSong();
  </script>
</body>
</html>
