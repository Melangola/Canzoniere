<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canzoniere</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="chordsheetbundle.js" defer></script>
  <script src="js/common.js" defer></script>
  <script src="js/song.js" defer></script>
</head>
<body>
  <a class="back-link" href="./">&larr; Torna all'indice</a>
  <h1 id="title">Canzone</h1>
  <div id="options" >
      <a
        id="youtube-link"
        class="youtube-link hidden"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Apri questa canzone su YouTube"
        title="Apri su YouTube"
        >
        <svg class="youtube-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31.6 31.6 0 0 0 0 12a31.6 31.6 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31.6 31.6 0 0 0 24 12a31.6 31.6 0 0 0-.5-5.8ZM9.6 15.6V8.4L15.8 12l-6.2 3.6Z" />
        </svg>
      </a>
      <!-- class="hidden" chords toggle (default off, visible only when chords available) -->
      <!-- class="hidden" auto scroll speed slider (default value taken from a speed directive like {speed: 5.0}) -->
  </div>
  <main id="song" class="panel"></main>
</body>
</html>
