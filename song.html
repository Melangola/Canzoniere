<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canzoniere</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="chordsheetbundle.js" defer></script>
  <script src="js/common.js" defer></script>
  <script src="js/song.js" defer></script>
</head>
<body class="pastel">
  <div class="container">
    <header class="header" >
      <a class="back" href="./">
        <img src="back.svg">
      </a>
      <div class="title">Canzoniere</div>
    </header>
    <div class="option-container" >
        <a id="youtube-link" class="option hidden" href="#" target="_blank" rel="noopener noreferrer" title="Apri su YouTube">
          <svg class="youtube-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31.6 31.6 0 0 0 0 12a31.6 31.6 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31.6 31.6 0 0 0 24 12a31.6 31.6 0 0 0-.5-5.8ZM9.6 15.6V8.4L15.8 12l-6.2 3.6Z" />
          </svg>
        </a>
        <label id="chords-option" class="option hidden">
          <input id="chords-toggle" type="checkbox" />
          Accordi
        </label>
        <label id="speed-option" class="option hidden">
          <input id="speed-toggle" type="checkbox" />
          Scroll
          <input id="speed-slider" type="range" min="0" max="50" step="0.5" value="10" />
        </label>
    </div>
    <div id="title"></div>
    <main id="song"></main>
  </div>
</body>
</html>
